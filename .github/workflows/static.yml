# Simple workflow for deploying static content to GitHub Pages
name: Despliegue de web en mi servidor

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: http://127.0.0.1
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # (Opcional pero recomendado) Configurar la versión de Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Puedes cambiar esto a la versión que utilices (ej. 18 o 22)

      # Ejecuta npm i para instalar las dependencias
      - name: Instalar dependencias
        run: npm i

      # Ejecuta npm run build para compilar el proyecto Vite + React
      - name: Construir el proyecto
        run: npm run build
